name: Frontend CI

on:
  push:
    branches:
      - feature/develop
      - master
    paths:
      - 'client/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'client/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect client directory
        id: detect
        shell: bash
        run: |
          if [ -f client/package.json ]; then
            echo "client_dir=client" >> "$GITHUB_OUTPUT"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "client_dir=." >> "$GITHUB_OUTPUT"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ steps.detect.outputs.client_dir }}/package-lock.json

      - name: Install dependencies
        if: steps.detect.outputs.exists == 'true'
        working-directory: ${{ steps.detect.outputs.client_dir }}
        run: npm ci

      - name: Test
        if: steps.detect.outputs.exists == 'true'
        working-directory: ${{ steps.detect.outputs.client_dir }}
        run: npm test --if-present

      - name: Build
        if: steps.detect.outputs.exists == 'true'
        working-directory: ${{ steps.detect.outputs.client_dir }}
        run: npm run build --if-present

      - name: Skip notice
        if: steps.detect.outputs.exists != 'true'
        run: echo "No client/package.json found. Frontend pipeline skipped."
