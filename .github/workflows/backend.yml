name: Backend CI/CD

on:
  push:
    branches:
      - feature/develop
      - master
    paths:
      - 'server/**'
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'server/**'
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Ambiente de despliegue'
        required: true
        type: choice
        options:
          - qas
          - prd

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  STAGE_QAS: qas
  STAGE_PRD: prd

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    outputs:
      backend_dir: ${{ steps.detect.outputs.backend_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect backend directory
        id: detect
        shell: bash
        run: |
          if [ -f server/package.json ]; then
            echo "backend_dir=server" >> "$GITHUB_OUTPUT"
          elif [ -f backend/package.json ]; then
            echo "backend_dir=backend" >> "$GITHUB_OUTPUT"
          else
            echo "backend_dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ steps.detect.outputs.backend_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ steps.detect.outputs.backend_dir }}
        run: npm ci

      - name: Generate Prisma client
        working-directory: ${{ steps.detect.outputs.backend_dir }}
        run: npm run prisma:generate

      - name: Run tests
        working-directory: ${{ steps.detect.outputs.backend_dir }}
        run: npm test

      - name: Build
        working-directory: ${{ steps.detect.outputs.backend_dir }}
        run: npm run build

  resolve-deploy-env:
    name: Resolve Deploy Environment
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
      target_env: ${{ steps.resolve.outputs.target_env }}

    steps:
      - name: Resolve deploy target
        id: resolve
        shell: bash
        run: |
          SHOULD_DEPLOY="false"
          TARGET_ENV=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_DEPLOY="true"
            TARGET_ENV="${{ github.event.inputs.target_env }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/feature/develop" ]; then
            SHOULD_DEPLOY="true"
            TARGET_ENV="qas"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/master" ]; then
            SHOULD_DEPLOY="true"
            TARGET_ENV="prd"
          fi

          echo "should_deploy=${SHOULD_DEPLOY}" >> "$GITHUB_OUTPUT"
          echo "target_env=${TARGET_ENV}" >> "$GITHUB_OUTPUT"

  backend-deploy:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    needs: [backend-ci, resolve-deploy-env]
    if: needs.resolve-deploy-env.outputs.should_deploy == 'true'
    environment: ${{ needs.resolve-deploy-env.outputs.target_env }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ needs.backend-ci.outputs.backend_dir }}/package-lock.json

      - name: Configure AWS credentials (OIDC)
        if: needs.resolve-deploy-env.outputs.target_env == 'qas'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_QAS }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - name: Configure AWS credentials (OIDC)
        if: needs.resolve-deploy-env.outputs.target_env == 'prd'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PRD }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - name: Install dependencies
        working-directory: ${{ needs.backend-ci.outputs.backend_dir }}
        run: npm ci

      - name: Generate Prisma client
        working-directory: ${{ needs.backend-ci.outputs.backend_dir }}
        run: npm run prisma:generate

      - name: Build
        working-directory: ${{ needs.backend-ci.outputs.backend_dir }}
        run: npm run build

      - name: Deploy with Serverless
        if: needs.resolve-deploy-env.outputs.target_env == 'qas'
        working-directory: ${{ needs.backend-ci.outputs.backend_dir }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_QAS }}
        run: npx serverless deploy --stage "${{ vars.STAGE_QAS || env.STAGE_QAS }}" --region "${{ vars.AWS_REGION || env.AWS_REGION }}"

      - name: Deploy with Serverless
        if: needs.resolve-deploy-env.outputs.target_env == 'prd'
        working-directory: ${{ needs.backend-ci.outputs.backend_dir }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRD }}
        run: npx serverless deploy --stage "${{ vars.STAGE_PRD || env.STAGE_PRD }}" --region "${{ vars.AWS_REGION || env.AWS_REGION }}"
